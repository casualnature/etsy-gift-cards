<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Birthday Joy Burst</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="phone-frame" aria-label="Birthday Joy Burst interactive card">
      <audio id="birthdayMusic" src="assets/music.mp3" preload="auto" loop></audio>

      <button id="musicToggle" class="music-toggle" type="button" aria-pressed="false">Music OFF</button>

      <section class="scene scene-1 is-active" data-scene="1" aria-label="Birthday surprise cover">
        <img src="assets/scene1-cover.png" alt="" class="scene-image" draggable="false" />
        <div class="tap-pulse" aria-hidden="true"></div>
      </section>

      <section class="scene scene-2" data-scene="2" aria-label="Gift box opening">
        <img src="assets/scene2-popout.png" alt="" class="scene-image" draggable="false" />
      </section>

      <section class="scene scene-3" data-scene="3" aria-label="Birthday notes">
        <img src="assets/scene3-notes.png" alt="" class="scene-image" draggable="false" />

        <button class="note-cover note-cover-pink" type="button" data-note="0" aria-label="Open pink birthday note">
          <span class="note-icon" aria-hidden="true">♡</span>
          <span class="note-mark" aria-hidden="true">✓</span>
        </button>

        <button class="note-cover note-cover-yellow" type="button" data-note="1" aria-label="Open yellow birthday note">
          <span class="note-icon" aria-hidden="true">★</span>
          <span class="note-mark" aria-hidden="true">✓</span>
        </button>

        <button class="note-cover note-cover-blue" type="button" data-note="2" aria-label="Open blue birthday note">
          <span class="note-icon" aria-hidden="true">♡</span>
          <span class="note-mark" aria-hidden="true">✓</span>
        </button>
      </section>

      <section class="scene scene-4" data-scene="4" aria-label="Happy Birthday finale">
        <img src="assets/scene4-final.png" alt="" class="scene-image" draggable="false" />
        <div id="finalName" class="final-name" aria-label="Birthday recipient name"></div>
        <div id="confettiLayer" class="confetti-layer" aria-hidden="true"></div>
        <button id="replayButton" class="replay-button" type="button">Replay</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
