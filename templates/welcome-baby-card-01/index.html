<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fbf6ec">
    <title>Welcome Baby Card</title>
    <link rel="preload" href="assets/cover.png" as="image">
    <link rel="preload" href="assets/story.png" as="image">
    <link rel="preload" href="assets/cradle-still.png" as="image">
    <link rel="preload" href="assets/final-bg.png" as="image">
    <link rel="preload" href="assets/cradle-loop.mp4" as="video" type="video/mp4">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page-shell" aria-label="Interactive welcome baby card">
      <section class="card-frame" id="card" aria-live="polite">
        <button class="scene scene-cover is-active" id="coverScene" type="button" aria-label="Open the card" aria-hidden="false">
          <img src="assets/cover.png" alt="A watercolor baby gift card cover">
        </button>

        <section class="scene scene-story" id="storyScene" aria-hidden="true">
          <img src="assets/story.png" alt="A watercolor story introduction">
        </section>

        <button class="scene scene-cradle-still" id="cradleStillScene" type="button" aria-label="Rock the cradle" aria-hidden="true">
          <img src="assets/cradle-still.png" alt="A peaceful watercolor cradle">
          <span class="tap-prompt">Tap gently to rock the cradle</span>
        </button>

        <section class="scene scene-cradle-video" id="cradleVideoScene" aria-hidden="true">
          <video
            id="cradleVideo"
            src="assets/cradle-loop.mp4"
            muted
            playsinline
            webkit-playsinline
            autoplay
            loop
            preload="auto"
          ></video>
        </section>

        <section class="scene scene-final" id="finalScene" aria-hidden="true">
          <img src="assets/final-bg.png" alt="A soft watercolor background for the final message">
          <div class="final-copy" id="finalCopy">
            <h1 id="finalHeadline"></h1>
            <p id="finalMessage"></p>
            <button class="soft-control watch-again-button" id="watchAgainButton" type="button">Watch Again</button>
          </div>
        </section>

        <button class="soft-control sound-toggle" id="soundToggle" type="button" aria-pressed="true">♪ On</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
